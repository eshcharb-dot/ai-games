<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<title>הצלת הפרות — Redefine Rescue</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Nunito','Segoe UI',Tahoma,sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;}
canvas{display:block;width:100%;height:100%;}
#ui-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;}

/* ---- KEYFRAMES ---- */
@keyframes bgShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
@keyframes titleIn{0%{transform:scale(0.3);opacity:0;filter:blur(8px);}60%{transform:scale(1.08);opacity:1;filter:blur(0);}100%{transform:scale(1);}}
@keyframes titleGlow{0%,100%{text-shadow:0 0 20px #00ff6644,0 0 60px #00ff6622;}50%{text-shadow:0 0 30px #00ff6688,0 0 80px #00ff6644;}}
@keyframes cowBob{0%,100%{transform:translateY(0) rotate(-3deg);}50%{transform:translateY(-14px) rotate(3deg);}}
@keyframes pulse{0%,100%{box-shadow:0 0 30px #22c55e55;}50%{box-shadow:0 0 50px #22c55eaa,0 0 80px #22c55e44;}}
@keyframes fadeSlideUp{0%{opacity:0;transform:translateY(40px);}100%{opacity:1;transform:translateY(0);}}
@keyframes victoryGlow{0%,100%{text-shadow:0 0 20px #4ade8066,0 0 50px #22c55e33;}50%{text-shadow:0 0 40px #4ade80aa,0 0 90px #22c55e66;}}

/* ---- TITLE SCREEN ---- */
#title-screen{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3d0f,#1a2e1a);background-size:300% 300%;animation:bgShift 12s ease infinite;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;color:#fff;text-align:center;padding:20px;overflow:hidden;}
#title-screen::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-conic-gradient(rgba(255,255,255,0.015) 0% 25%,transparent 0% 50%) 0 0/4px 4px;pointer-events:none;z-index:1;}
#title-screen>*{position:relative;z-index:2;}
#title-screen h1{font-family:'Bangers','Nunito',sans-serif;font-size:clamp(32px,7vw,64px);margin-bottom:10px;animation:titleIn 0.8s ease-out both,titleGlow 3s ease-in-out infinite;letter-spacing:2px;}
#title-screen h2{font-family:'Bangers','Nunito',sans-serif;font-size:clamp(18px,3.5vw,32px);color:#4ade80;margin-bottom:10px;animation:titleIn 0.8s 0.15s ease-out both;}
.cow-deco{font-size:clamp(40px,8vw,72px);animation:cowBob 2.5s ease-in-out infinite;margin-bottom:20px;}
#title-screen .instructions{font-size:clamp(13px,2.2vw,18px);color:#ccc;max-width:500px;line-height:1.8;margin-bottom:30px;direction:rtl;animation:fadeSlideUp 0.6s 0.3s ease-out both;}
#start-btn{pointer-events:all;font-family:'Bangers','Nunito',sans-serif;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;padding:18px 50px;font-size:clamp(18px,3vw,26px);border-radius:50px;cursor:pointer;font-weight:bold;animation:pulse 2s ease-in-out infinite;transition:transform .15s,box-shadow .15s;letter-spacing:1px;}
#start-btn:hover{transform:scale(1.08);box-shadow:0 0 50px #22c55e88;}
#start-btn:active{transform:scale(0.95);box-shadow:0 0 20px #22c55e44;}

/* ---- END SCREENS ---- */
#game-over-screen,#victory-screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;color:#fff;text-align:center;padding:20px;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
#game-over-screen{background:rgba(20,0,0,0.88);}
#victory-screen{background:rgba(0,20,5,0.88);}
.end-title{font-family:'Bangers','Nunito',sans-serif;font-size:clamp(32px,7vw,58px);margin-bottom:20px;animation:fadeSlideUp 0.5s ease-out both;letter-spacing:2px;}
#victory-screen .end-title{animation:fadeSlideUp 0.5s ease-out both,victoryGlow 2.5s ease-in-out 0.5s infinite;}
.end-stats{font-size:clamp(14px,2.5vw,22px);line-height:2;margin-bottom:25px;animation:fadeSlideUp 0.5s 0.15s ease-out both;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:18px 28px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
.replay-btn{pointer-events:all;font-family:'Bangers','Nunito',sans-serif;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;padding:16px 44px;font-size:clamp(16px,3vw,24px);border-radius:50px;cursor:pointer;font-weight:bold;box-shadow:0 0 30px #22c55e55;animation:fadeSlideUp 0.5s 0.3s ease-out both;transition:transform .15s,box-shadow .15s;letter-spacing:1px;}
.replay-btn:hover{transform:scale(1.08);box-shadow:0 0 50px #22c55e88;}
.replay-btn:active{transform:scale(0.95);box-shadow:0 0 20px #22c55e44;}
</style>
</head>
<body>
<div id="title-screen">
<h1>הצלת הפרות</h1>
<h2>Redefine Rescue</h2>
<div class="cow-deco" aria-hidden="true">🐄</div>
<div class="instructions">
שלטו במדפסת התלת-ממד של Redefine Meat<br>
ירו סטייקים צמחיים בקצבים כדי להציל את הפרות!<br><br>
🎮 תנועה: WASD / חצים / ג'ויסטיק<br>
🎯 ירי: עכבר / רווח / נגיעה<br>
⚡ אספו כוחות מיוחדים בדרך!
</div>
<button id="start-btn">!התחל משחק 🐄</button>
</div>
<div id="game-over-screen">
<div class="end-title">💀 המשחק נגמר</div>
<div class="end-stats" id="go-stats"></div>
<button class="replay-btn" id="replay-btn1">🔄 שחק שוב</button>
</div>
<div id="victory-screen">
<div class="end-title">🐄💚 הצלת את הפרות!</div>
<div class="end-stats" id="vic-stats"></div>
<button class="replay-btn" id="replay-btn2">🔄 שחק שוב</button>
</div>
<canvas id="gc"></canvas>

<script>
// ============================================================
// REDEFINE RESCUE — Complete Game
// ============================================================
(function(){
"use strict";

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const titleScreen = document.getElementById('title-screen');
const gameOverScreen = document.getElementById('game-over-screen');
const victoryScreen = document.getElementById('victory-screen');

// ---- Audio Engine (Web Audio API) ----
let audioCtx = null;
function initAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
function playSound(type){
  if(!audioCtx) return;
  try{
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const t = audioCtx.currentTime;
    switch(type){
      case 'shoot':
        osc.type='square';osc.frequency.setValueAtTime(600,t);osc.frequency.exponentialRampToValueAtTime(200,t+0.08);
        gain.gain.setValueAtTime(0.12,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.1);
        osc.start(t);osc.stop(t+0.1);break;
      case 'convert':
        osc.type='sine';osc.frequency.setValueAtTime(400,t);osc.frequency.exponentialRampToValueAtTime(900,t+0.15);
        gain.gain.setValueAtTime(0.15,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.25);
        osc.start(t);osc.stop(t+0.25);break;
      case 'moo':
        osc.type='sawtooth';osc.frequency.setValueAtTime(120,t);osc.frequency.exponentialRampToValueAtTime(80,t+0.4);
        gain.gain.setValueAtTime(0.1,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.5);
        osc.start(t);osc.stop(t+0.5);break;
      case 'powerup':
        osc.type='sine';osc.frequency.setValueAtTime(500,t);osc.frequency.exponentialRampToValueAtTime(1200,t+0.2);
        gain.gain.setValueAtTime(0.12,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.3);
        osc.start(t);osc.stop(t+0.3);break;
      case 'wave':
        osc.type='triangle';osc.frequency.setValueAtTime(300,t);osc.frequency.exponentialRampToValueAtTime(600,t+0.3);
        gain.gain.setValueAtTime(0.1,t);gain.gain.exponentialRampToValueAtTime(0.001,t+0.4);
        osc.start(t);osc.stop(t+0.4);break;
    }
  }catch(e){}
}

// ---- Constants ----
const TOTAL_WAVES = 15;
const MAX_LIVES = 5;
const STEAK_SPEED = 8;
const STEAK_SIZE = 6;
const COW_COUNT = 6;
const POWERUP_INTERVAL = 12000;

// ---- Game State ----
let W, H, scale;
let gameState = 'title'; // title, playing, waveBreak, gameOver, victory
let score=0, wave=0, lives=MAX_LIVES, converted=0;
let steaks=[], butchers=[], cows=[], particles=[], powerups=[], textBubbles=[];
let player={x:0,y:0,w:50,h:35,angle:0,nozzleGlow:0};
let keys={}, mouse, shakeMag=0, shakeTimer=0;
let activePowerups={turbo:0, spread:0, wagyu:0};
let waveTimer=0, waveSpawnQueue=[], waveBreakTimer=0;
let lastPowerupTime=0, lastShootTime=0, shootCooldown=280;
let confettiParts = [];
let touchJoystick = {active:false, sx:0, sy:0, cx:0, cy:0, dx:0, dy:0};
let touchShoot = {active:false, tx:0, ty:0};
let isMobile = false;
let gameTime = 0;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  scale = Math.min(W/800, H/600);
  isMobile = ('ontouchstart' in window) || W < 768;
}
window.addEventListener('resize', resize);
resize();

// ---- Utility ----
function dist(a,b){return Math.hypot(a.x-b.x, a.y-b.y);}
function angle(a,b){return Math.atan2(b.y-a.y, b.x-a.x);}
function lerp(a,b,t){return a+(b-a)*t;}
function rand(a,b){return Math.random()*(b-a)+a;}
function randInt(a,b){return Math.floor(rand(a,b+1));}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v));}

// ---- Init Game ----
function initGame(){
  score=0; wave=0; lives=MAX_LIVES; converted=0;
  steaks=[]; butchers=[]; particles=[]; powerups=[]; textBubbles=[];
  activePowerups={turbo:0, spread:0, wagyu:0};
  shakeMag=0; shakeTimer=0;
  lastPowerupTime=0; lastShootTime=0; shootCooldown=280;
  gameTime=0;
  player={x:W/2, y:H/2, w:50*scale, h:35*scale, angle:0, nozzleGlow:0};
  keys={};
  initCows();
  startNextWave();
}

function initCows(){
  cows=[];
  for(let i=0;i<COW_COUNT;i++){
    cows.push({
      x: rand(100, W-100),
      y: rand(100, H-100),
      vx: rand(-0.3,0.3),
      vy: rand(-0.3,0.3),
      bob: rand(0, Math.PI*2),
      happy: 0, // timer for happy state
      size: 22*scale
    });
  }
}

// ---- Wave Definitions ----
function getWaveEnemies(w){
  const e=[];
  if(w===1){for(let i=0;i<5;i++)e.push('butcher');}
  else if(w===2){for(let i=0;i<7;i++)e.push('butcher');for(let i=0;i<2;i++)e.push('bbq');}
  else if(w===3){for(let i=0;i<5;i++)e.push('butcher');for(let i=0;i<3;i++)e.push('bbq');e.push('chef');}
  else if(w<=6){
    for(let i=0;i<4+w;i++)e.push('butcher');
    for(let i=0;i<w-1;i++)e.push('bbq');
    for(let i=0;i<Math.floor(w/3);i++)e.push('chef');
  } else if(w<=10){
    for(let i=0;i<3+w;i++)e.push('butcher');
    for(let i=0;i<w;i++)e.push('bbq');
    for(let i=0;i<Math.floor(w/2);i++)e.push('chef');
    for(let i=0;i<Math.floor((w-6)/2);i++)e.push('mogul');
  } else {
    for(let i=0;i<w+2;i++)e.push('butcher');
    for(let i=0;i<w-2;i++)e.push('bbq');
    for(let i=0;i<Math.floor(w/2);i++)e.push('chef');
    for(let i=0;i<Math.floor((w-5)/2);i++)e.push('mogul');
  }
  return e;
}

const BUTCHER_DEFS = {
  butcher: {hp:1,speed:1.2,size:18,emoji:'🔪',color:'#dc2626'},
  bbq:     {hp:2,speed:1.6,size:20,emoji:'🍖',color:'#ea580c'},
  chef:    {hp:3,speed:2.1,size:22,emoji:'👨‍🍳',color:'#7c3aed'},
  mogul:   {hp:4,speed:1.4,size:26,emoji:'🥩',color:'#be123c'}
};

function spawnButcher(type){
  const def = BUTCHER_DEFS[type];
  const spd = def.speed * (1 + wave*0.03) * scale;
  const sz = def.size * scale;
  // spawn from edges
  let x,y;
  const side = randInt(0,3);
  if(side===0){x=rand(-30,-10);y=rand(0,H);}
  else if(side===1){x=rand(W+10,W+30);y=rand(0,H);}
  else if(side===2){x=rand(0,W);y=rand(-30,-10);}
  else{x=rand(0,W);y=rand(H+10,H+30);}

  butchers.push({
    x, y, type, hp:def.hp, maxHp:def.hp, speed:spd, size:sz,
    emoji:def.emoji, color:def.color,
    targetCow:null, converting:0, converted:false,
    flashTimer:0, angle:0
  });
}

function startNextWave(){
  wave++;
  if(wave > TOTAL_WAVES){
    gameState='victory';
    showVictory();
    return;
  }
  gameState='waveBreak';
  waveBreakTimer = 2000;
  waveSpawnQueue = getWaveEnemies(wave);
  waveTimer = 0;
  playSound('wave');
}

// ---- Shooting ----
function shootSteak(targetX, targetY){
  const now = performance.now();
  const cd = activePowerups.turbo > 0 ? 100 : shootCooldown;
  if(now - lastShootTime < cd) return;
  lastShootTime = now;

  const a = Math.atan2(targetY - player.y, targetX - player.x);
  player.angle = a;
  player.nozzleGlow = 1;

  const isWagyu = activePowerups.wagyu > 0;

  if(activePowerups.spread > 0){
    for(let i=-1;i<=1;i++){
      const sa = a + i * 0.2;
      steaks.push({x:player.x, y:player.y, vx:Math.cos(sa)*STEAK_SPEED*scale, vy:Math.sin(sa)*STEAK_SPEED*scale, wagyu:isWagyu, trail:[], life:300});
    }
    if(isWagyu) activePowerups.wagyu = Math.max(0, activePowerups.wagyu - 3);
  } else {
    steaks.push({x:player.x, y:player.y, vx:Math.cos(a)*STEAK_SPEED*scale, vy:Math.sin(a)*STEAK_SPEED*scale, wagyu:isWagyu, trail:[], life:300});
    if(isWagyu) activePowerups.wagyu--;
  }

  playSound('shoot');
  // recoil particle
  for(let i=0;i<3;i++){
    particles.push({x:player.x, y:player.y, vx:rand(-1,1), vy:rand(-1,1), life:15, maxLife:15, color:'#4ade80', size:3*scale});
  }
}

// ---- Power-ups ----
const POWERUP_TYPES = [
  {type:'turbo', emoji:'⚡', color:'#facc15', label:'טורבו!'},
  {type:'spread', emoji:'🌟', color:'#f472b6', label:'שלישייה!'},
  {type:'wagyu', emoji:'💎', color:'#60a5fa', label:'!וואגיו'}
];

function spawnPowerup(){
  const pt = POWERUP_TYPES[randInt(0,2)];
  powerups.push({
    x: rand(60, W-60), y: rand(60, H-60),
    type: pt.type, emoji: pt.emoji, color: pt.color, label: pt.label,
    bob: rand(0, Math.PI*2), life: 10000, size: 20*scale
  });
}

function collectPowerup(p){
  if(p.type==='turbo') activePowerups.turbo = 300; // frames
  else if(p.type==='spread') activePowerups.spread = 300;
  else if(p.type==='wagyu') activePowerups.wagyu = 3;
  playSound('powerup');
  // big flash particles
  for(let i=0;i<15;i++){
    const a2=rand(0,Math.PI*2);
    particles.push({x:p.x, y:p.y, vx:Math.cos(a2)*rand(2,5), vy:Math.sin(a2)*rand(2,5), life:30, maxLife:30, color:p.color, size:rand(3,6)*scale});
  }
  textBubbles.push({x:p.x, y:p.y-20, text:p.label, life:60, maxLife:60, color:p.color, size:18*scale});
}

// ---- Conversion ----
const CONVERT_TEXTS = [
  '!וואו, זה בשר?',
  '!אני צמחוני עכשיו',
  '!טעים יותר מבשר',
  '!מדהים',
  '!הבשר של העתיד',
  '!לא מאמין שזה צמחי'
];

function convertButcher(b){
  b.converted = true;
  b.converting = 60;
  converted++;
  score += b.maxHp * 100;
  playSound('convert');

  // green sparkle particles
  for(let i=0;i<20;i++){
    const a2=rand(0,Math.PI*2);
    particles.push({x:b.x, y:b.y, vx:Math.cos(a2)*rand(2,6), vy:Math.sin(a2)*rand(2,6), life:40, maxLife:40, color:'#4ade80', size:rand(2,5)*scale});
  }

  // text bubble
  const txt = CONVERT_TEXTS[randInt(0, CONVERT_TEXTS.length-1)];
  textBubbles.push({x:b.x, y:b.y-30, text:txt, life:90, maxLife:90, color:'#4ade80', size:14*scale});

  // make nearby cows happy
  for(const c of cows){
    if(dist(b,c)<150*scale) c.happy = 60;
  }

  // screen shake
  shakeMag = 4; shakeTimer = 10;
}

// ---- Cow lost ----
function loseCow(b, cow){
  lives--;
  playSound('moo');
  shakeMag = 8; shakeTimer = 15;

  // sad particles
  for(let i=0;i<10;i++){
    const a2=rand(0,Math.PI*2);
    particles.push({x:cow.x, y:cow.y, vx:Math.cos(a2)*rand(1,3), vy:Math.sin(a2)*rand(1,3), life:30, maxLife:30, color:'#ef4444', size:rand(3,5)*scale});
  }

  // relocate cow
  cow.x = rand(100, W-100);
  cow.y = rand(100, H-100);

  // remove butcher
  b.hp = -999;

  if(lives <= 0){
    gameState = 'gameOver';
    showGameOver();
  }
}

// ---- End Screens ----
function showGameOver(){
  const s = document.getElementById('go-stats');
  s.innerHTML = `גל: ${wave}<br>ניקוד: ${score}<br>קצבים שהומרו: ${converted} 🌱`;
  gameOverScreen.style.display = 'flex';
}
function showVictory(){
  const s = document.getElementById('vic-stats');
  s.innerHTML = `ניקוד סופי: ${score}<br>קצבים שהומרו: ${converted} 🌱<br>פרות שניצלו: ${lives} 🐄`;
  victoryScreen.style.display = 'flex';
  // confetti
  confettiParts = [];
  for(let i=0;i<120;i++){
    confettiParts.push({x:rand(0,W), y:rand(-H,0), vx:rand(-2,2), vy:rand(1,4), color:['#22c55e','#4ade80','#facc15','#f472b6','#60a5fa','#fff'][randInt(0,5)], size:rand(4,10), rot:rand(0,6.28), rv:rand(-0.1,0.1)});
  }
}

// ---- Input ----
window.addEventListener('keydown', e=>{keys[e.code]=true; if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();});
window.addEventListener('keyup', e=>{keys[e.code]=false;});

mouse = {x:W/2, y:H/2, down:false};
canvas.addEventListener('mousemove', e=>{mouse.x=e.clientX; mouse.y=e.clientY;});
canvas.addEventListener('mousedown', e=>{mouse.down=true; mouse.x=e.clientX; mouse.y=e.clientY;
  if(gameState==='playing') shootSteak(mouse.x, mouse.y);
});
canvas.addEventListener('mouseup', ()=>{mouse.down=false;});

// Touch
const JOYSTICK_ZONE = 150;
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.clientX < W * 0.4){
      touchJoystick.active = true;
      touchJoystick.sx = t.clientX;
      touchJoystick.sy = t.clientY;
      touchJoystick.cx = t.clientX;
      touchJoystick.cy = t.clientY;
      touchJoystick.id = t.identifier;
    } else {
      touchShoot.active = true;
      touchShoot.tx = t.clientX;
      touchShoot.ty = t.clientY;
      touchShoot.id = t.identifier;
      if(gameState==='playing') shootSteak(t.clientX, t.clientY);
    }
  }
}, {passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    if(t.identifier === touchJoystick.id && touchJoystick.active){
      touchJoystick.cx = t.clientX;
      touchJoystick.cy = t.clientY;
      let dx = touchJoystick.cx - touchJoystick.sx;
      let dy = touchJoystick.cy - touchJoystick.sy;
      const d = Math.hypot(dx,dy);
      if(d > JOYSTICK_ZONE){dx=dx/d*JOYSTICK_ZONE; dy=dy/d*JOYSTICK_ZONE;}
      touchJoystick.dx = dx / JOYSTICK_ZONE;
      touchJoystick.dy = dy / JOYSTICK_ZONE;
    }
    if(t.identifier === touchShoot.id && touchShoot.active){
      touchShoot.tx = t.clientX;
      touchShoot.ty = t.clientY;
    }
  }
}, {passive:false});
canvas.addEventListener('touchend', e=>{
  for(const t of e.changedTouches){
    if(t.identifier === touchJoystick.id){touchJoystick.active=false; touchJoystick.dx=0; touchJoystick.dy=0;}
    if(t.identifier === touchShoot.id){touchShoot.active=false;}
  }
});

// ---- UPDATE ----
function update(dt){
  const ms = dt * 16.667; // approx ms this frame
  gameTime += ms;

  if(gameState === 'waveBreak'){
    waveBreakTimer -= ms;
    if(waveBreakTimer <= 0){
      gameState = 'playing';
      waveTimer = 0;
    }
    updateCows();
    updateParticles();
    updateTextBubbles();
    return;
  }

  if(gameState !== 'playing') return;

  // ---- Player Movement ----
  const pSpeed = 4 * scale;
  let mx=0, my=0;
  if(keys['KeyW']||keys['ArrowUp']) my=-1;
  if(keys['KeyS']||keys['ArrowDown']) my=1;
  if(keys['KeyA']||keys['ArrowLeft']) mx=-1;
  if(keys['KeyD']||keys['ArrowRight']) mx=1;

  if(touchJoystick.active){
    mx = touchJoystick.dx;
    my = touchJoystick.dy;
  }

  const mLen = Math.hypot(mx,my);
  if(mLen > 0){mx/=mLen; my/=mLen;}
  player.x = clamp(player.x + mx*pSpeed, 30, W-30);
  player.y = clamp(player.y + my*pSpeed, 30, H-30);

  // Keyboard shoot (space) — aim toward mouse
  if(keys['Space']){
    shootSteak(mouse.x, mouse.y);
  }
  // Auto-fire on mobile touch hold
  if(touchShoot.active){
    shootSteak(touchShoot.tx, touchShoot.ty);
  }

  // Mouse hold auto fire
  if(mouse.down){
    shootSteak(mouse.x, mouse.y);
  }

  player.nozzleGlow *= 0.9;
  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
  if(touchShoot.active){
    player.angle = Math.atan2(touchShoot.ty - player.y, touchShoot.tx - player.x);
  }

  // ---- Spawn enemies from queue ----
  waveTimer += ms;
  if(waveSpawnQueue.length > 0 && waveTimer > 650){
    waveTimer = 0;
    spawnButcher(waveSpawnQueue.shift());
  }

  // ---- Steaks ----
  for(let i=steaks.length-1; i>=0; i--){
    const s = steaks[i];
    s.trail.push({x:s.x, y:s.y});
    if(s.trail.length > 6) s.trail.shift();
    s.x += s.vx;
    s.y += s.vy;
    s.life--;
    if(s.x<-20||s.x>W+20||s.y<-20||s.y>H+20||s.life<=0){steaks.splice(i,1);continue;}

    // hit butchers
    for(let j=butchers.length-1; j>=0; j--){
      const b = butchers[j];
      if(b.converted || b.converting > 0) continue;
      if(dist(s,b) < b.size + STEAK_SIZE*scale){
        if(s.wagyu){
          b.hp = 0;
        } else {
          b.hp--;
        }
        b.flashTimer = 8;
        steaks.splice(i,1);
        score += 10;

        // hit particles
        for(let k=0;k<5;k++){
          particles.push({x:s.x, y:s.y, vx:rand(-2,2), vy:rand(-2,2), life:15, maxLife:15, color:'#f97316', size:3*scale});
        }

        if(b.hp <= 0){
          convertButcher(b);
        }
        break;
      }
    }
  }

  // ---- Butchers ----
  for(let i=butchers.length-1; i>=0; i--){
    const b = butchers[i];
    if(b.hp < -900){butchers.splice(i,1);continue;}

    if(b.converted){
      b.converting--;
      if(b.converting <= -120){butchers.splice(i,1);continue;} // fade out after conversion
      continue;
    }
    if(b.converting > 0){b.converting--; continue;}

    b.flashTimer = Math.max(0, b.flashTimer - 1);

    // find nearest cow
    let nearCow = null, nearDist = Infinity;
    for(const c of cows){
      const d = dist(b,c);
      if(d < nearDist){nearDist=d; nearCow=c;}
    }

    if(nearCow){
      const a2 = angle(b, nearCow);
      b.x += Math.cos(a2) * b.speed;
      b.y += Math.sin(a2) * b.speed;
      b.angle = a2;

      // reached cow?
      if(nearDist < nearCow.size + b.size){
        loseCow(b, nearCow);
      }
    }
  }

  // Remove dead butchers
  butchers = butchers.filter(b => b.hp > -900);

  // ---- Check wave complete ----
  const aliveButchers = butchers.filter(b => !b.converted);
  if(waveSpawnQueue.length === 0 && aliveButchers.length === 0){
    startNextWave();
  }

  // ---- Cows ----
  updateCows();

  // ---- Power-ups ----
  if(gameTime - lastPowerupTime > POWERUP_INTERVAL && powerups.length < 2){
    spawnPowerup();
    lastPowerupTime = gameTime;
  }

  for(let i=powerups.length-1; i>=0; i--){
    const p = powerups[i];
    p.life -= ms;
    p.bob += 0.05;
    if(p.life <= 0){powerups.splice(i,1);continue;}
    if(dist(player, p) < 40*scale){
      collectPowerup(p);
      powerups.splice(i,1);
    }
  }

  // ---- Active power-up timers ----
  if(activePowerups.turbo > 0) activePowerups.turbo--;
  if(activePowerups.spread > 0) activePowerups.spread--;
  // wagyu is count-based

  // ---- Particles & Bubbles ----
  updateParticles();
  updateTextBubbles();

  // ---- Shake ----
  if(shakeTimer > 0) shakeTimer--;
  else shakeMag = 0;
}

function updateCows(){
  for(const c of cows){
    c.bob += 0.04;
    c.x += c.vx;
    c.y += c.vy;
    // bounce off walls
    if(c.x < 40 || c.x > W-40) c.vx *= -1;
    if(c.y < 40 || c.y > H-40) c.vy *= -1;
    c.x = clamp(c.x, 40, W-40);
    c.y = clamp(c.y, 40, H-40);
    // gentle random direction change
    if(Math.random() < 0.005){c.vx = rand(-0.4,0.4); c.vy = rand(-0.4,0.4);}
    if(c.happy > 0) c.happy--;
  }
}

function updateParticles(){
  for(let i=particles.length-1; i>=0; i--){
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.life--;
    if(p.life <= 0) particles.splice(i,1);
  }
}

function updateTextBubbles(){
  for(let i=textBubbles.length-1; i>=0; i--){
    const t = textBubbles[i];
    t.y -= 0.8;
    t.life--;
    if(t.life <= 0) textBubbles.splice(i,1);
  }
}

// ---- DRAW ----
function draw(){
  ctx.save();

  // Only draw background on title/end screens
  if(gameState === 'title' || gameState === 'gameOver' || gameState === 'victory'){
    drawBackground();
    if(gameState === 'victory'){
      for(const c of confettiParts){
        c.y += c.vy; c.x += c.vx; c.rot += c.rv;
        if(c.y > H+20) c.y = -10;
        ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.rot);
        ctx.fillStyle = c.color; ctx.fillRect(-c.size/2, -c.size/4, c.size, c.size/2);
        ctx.restore();
      }
    }
    ctx.restore();
    return;
  }

  // screen shake
  if(shakeTimer > 0){
    ctx.translate(rand(-shakeMag,shakeMag), rand(-shakeMag,shakeMag));
  }

  // ---- Background ----
  drawBackground();

  // ---- Power-ups ----
  for(const p of powerups){
    ctx.save();
    ctx.translate(p.x, p.y + Math.sin(p.bob)*5);
    // glow
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 15;
    ctx.font = `${p.size*2}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.emoji, 0, 0);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // ---- Cows ----
  for(const c of cows){
    ctx.save();
    ctx.translate(c.x, c.y + Math.sin(c.bob)*3);
    const cowSize = c.size * 2;
    ctx.font = `${cowSize}px serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if(c.happy > 0){
      ctx.fillText('🐄', 0, 0);
      // happy hearts
      ctx.font = `${12*scale}px serif`;
      ctx.fillText('💚', Math.sin(c.happy*0.2)*10, -cowSize*0.6);
    } else {
      ctx.fillText('🐄', 0, 0);
    }
    ctx.restore();
  }

  // ---- Steaks ----
  for(const s of steaks){
    // trail
    for(let ti=0; ti<s.trail.length; ti++){
      const t = s.trail[ti];
      const a = ti / s.trail.length;
      ctx.beginPath();
      ctx.arc(t.x, t.y, STEAK_SIZE*scale*a*0.7, 0, Math.PI*2);
      if(s.wagyu){
        ctx.fillStyle = `rgba(96,165,250,${a*0.5})`;
      } else {
        ctx.fillStyle = `rgba(234,88,12,${a*0.4})`;
      }
      ctx.fill();
    }
    // steak body
    ctx.beginPath();
    ctx.arc(s.x, s.y, STEAK_SIZE*scale, 0, Math.PI*2);
    if(s.wagyu){
      ctx.fillStyle = '#60a5fa';
      ctx.shadowColor = '#60a5fa';
      ctx.shadowBlur = 10;
    } else {
      ctx.fillStyle = '#c2410c';
      ctx.shadowColor = '#ea580c';
      ctx.shadowBlur = 6;
    }
    ctx.fill();
    ctx.shadowBlur = 0;
    // inner highlight
    ctx.beginPath();
    ctx.arc(s.x - STEAK_SIZE*scale*0.2, s.y - STEAK_SIZE*scale*0.2, STEAK_SIZE*scale*0.4, 0, Math.PI*2);
    ctx.fillStyle = s.wagyu ? '#93c5fd' : '#fb923c';
    ctx.fill();
  }

  // ---- Butchers ----
  for(const b of butchers){
    ctx.save();
    ctx.translate(b.x, b.y);

    if(b.converted){
      const fade = Math.max(0, (b.converting + 120) / 120);
      ctx.globalAlpha = Math.min(1, fade);
      // green tint
      ctx.beginPath();
      ctx.arc(0, 0, b.size*1.5, 0, Math.PI*2);
      ctx.fillStyle = `rgba(74,222,128,${0.3 * fade})`;
      ctx.fill();

      const emojiSize = b.size * 2;
      ctx.font = `${emojiSize}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(b.converting > 30 ? '🤯' : '🌱', 0, 0);
    } else if(b.converting > 0){
      // mid-conversion animation
      ctx.font = `${b.size*2.5}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🤯', 0, 0);
    } else {
      // flash on hit
      if(b.flashTimer > 0){
        ctx.beginPath();
        ctx.arc(0, 0, b.size*1.8, 0, Math.PI*2);
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fill();
      }

      // body circle
      ctx.beginPath();
      ctx.arc(0, 0, b.size, 0, Math.PI*2);
      ctx.fillStyle = b.color;
      ctx.fill();
      ctx.strokeStyle = '#fff3';
      ctx.lineWidth = 2;
      ctx.stroke();

      // emoji
      ctx.font = `${b.size*1.6}px serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(b.emoji, 0, 0);

      // hp bar
      if(b.hp < b.maxHp){
        const bw = b.size*2;
        ctx.fillStyle = '#333';
        ctx.fillRect(-bw/2, -b.size-10, bw, 5);
        ctx.fillStyle = '#4ade80';
        ctx.fillRect(-bw/2, -b.size-10, bw*(b.hp/b.maxHp), 5);
      }
    }
    ctx.restore();
  }

  // ---- Player (Printer) ----
  drawPrinter();

  // ---- Particles ----
  for(const p of particles){
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * a, 0, Math.PI*2);
    ctx.fillStyle = p.color;
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // ---- Text Bubbles ----
  for(const t of textBubbles){
    const a = Math.min(1, t.life / (t.maxLife * 0.3));
    ctx.globalAlpha = a;
    ctx.font = `bold ${t.size}px Nunito, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = t.color;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeText(t.text, t.x, t.y);
    ctx.fillText(t.text, t.x, t.y);
  }
  ctx.globalAlpha = 1;

  // ---- Wave Break text ----
  if(gameState === 'waveBreak'){
    ctx.save();
    const a = Math.min(1, waveBreakTimer / 500);
    ctx.globalAlpha = a;
    ctx.font = `bold ${48*scale}px Nunito, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    const txt = `!${wave} גל`;
    ctx.strokeText(txt, W/2, H/2);
    ctx.fillText(txt, W/2, H/2);
    ctx.font = `${24*scale}px Nunito, sans-serif`;
    ctx.fillStyle = '#4ade80';
    ctx.strokeText('...מתכוננים', W/2, H/2 + 50*scale);
    ctx.fillText('...מתכוננים', W/2, H/2 + 50*scale);
    ctx.restore();
  }

  // ---- HUD ----
  drawHUD();

  // ---- Mobile Joystick ----
  if(isMobile && touchJoystick.active){
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(touchJoystick.sx, touchJoystick.sy, JOYSTICK_ZONE, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.arc(touchJoystick.sx + touchJoystick.dx*JOYSTICK_ZONE, touchJoystick.sy + touchJoystick.dy*JOYSTICK_ZONE, 30, 0, Math.PI*2);
    ctx.fillStyle = '#4ade80';
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawBackground(){
  // Rich grass gradient with more color stops
  const grd = ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0, '#2d5016');
  grd.addColorStop(0.3, '#2a5a14');
  grd.addColorStop(0.5, '#1f4a0e');
  grd.addColorStop(0.7, '#1a4210');
  grd.addColorStop(1, '#12300a');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // Darker patches (parallax-style depth)
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  for(let i=0; i<30; i++){
    const px = ((i * 131 + 47) % W);
    const py = ((i * 89 + 17) % H);
    const pr = 30 + (i % 20) * 2;
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, Math.PI*2);
    ctx.fill();
  }

  // Lighter spots (subtle highlights)
  ctx.fillStyle = 'rgba(74,222,128,0.035)';
  for(let i=0; i<50; i++){
    const lx = ((i * 97 + 13) % W);
    const ly = ((i * 73 + 29) % H);
    ctx.beginPath();
    ctx.arc(lx, ly, 18 + i % 15, 0, Math.PI*2);
    ctx.fill();
  }

  // Subtle grass texture dots
  ctx.fillStyle = 'rgba(74,222,128,0.04)';
  for(let i=0; i<80; i++){
    const gx = ((i * 97 + 13) % W);
    const gy = ((i * 73 + 29) % H);
    ctx.beginPath();
    ctx.arc(gx, gy, 20+i%15, 0, Math.PI*2);
    ctx.fill();
  }

  // Grid lines with subtle pulse
  const gridPulse = 0.04 + Math.sin(gameTime * 0.001) * 0.015;
  ctx.strokeStyle = `rgba(74,222,128,${gridPulse})`;
  ctx.lineWidth = 1;
  const gridSize = 80 * scale;
  for(let x=0; x<W; x+=gridSize){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for(let y=0; y<H; y+=gridSize){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  // Vignette effect (darker edges)
  const vg = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.25, W/2, H/2, Math.max(W,H)*0.75);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);
}

function drawPrinter(){
  ctx.save();
  ctx.translate(player.x, player.y);

  const pw = player.w;
  const ph = player.h;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, ph*0.5, pw*0.5, ph*0.2, 0, 0, Math.PI*2);
  ctx.fill();

  // Body (dark box)
  ctx.fillStyle = '#1a1a2e';
  ctx.strokeStyle = '#4ade80';
  ctx.lineWidth = 2;
  const r = 5*scale;
  roundRect(ctx, -pw/2, -ph/2, pw, ph, r);
  ctx.fill();
  ctx.stroke();

  // Top panel line
  ctx.fillStyle = '#2a2a4a';
  roundRect(ctx, -pw/2+4, -ph/2+4, pw-8, ph*0.35, r);
  ctx.fill();

  // Green accent strip
  ctx.fillStyle = '#22c55e';
  ctx.fillRect(-pw/2+6, ph*0.05, pw-12, 3*scale);

  // Nozzle (points toward aim direction)
  ctx.save();
  ctx.rotate(player.angle);
  // Nozzle arm
  ctx.fillStyle = '#333';
  ctx.fillRect(pw*0.3, -4*scale, pw*0.3, 8*scale);
  // Nozzle tip glow
  const glowIntensity = 0.3 + player.nozzleGlow * 0.7;
  ctx.fillStyle = `rgba(74,222,128,${glowIntensity})`;
  ctx.shadowColor = '#4ade80';
  ctx.shadowBlur = 10 + player.nozzleGlow * 20;
  ctx.beginPath();
  ctx.arc(pw*0.6, 0, 5*scale, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();

  // "RM" text on printer
  ctx.fillStyle = '#4ade80';
  ctx.font = `bold ${11*scale}px Nunito, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('RM', 0, -ph*0.1);

  // Small LED indicators
  ctx.fillStyle = activePowerups.turbo > 0 ? '#facc15' : '#4ade80';
  ctx.beginPath(); ctx.arc(-pw*0.3, ph*0.25, 2.5*scale, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = activePowerups.spread > 0 ? '#f472b6' : '#333';
  ctx.beginPath(); ctx.arc(-pw*0.15, ph*0.25, 2.5*scale, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = activePowerups.wagyu > 0 ? '#60a5fa' : '#333';
  ctx.beginPath(); ctx.arc(0, ph*0.25, 2.5*scale, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawHUD(){
  const fs = Math.max(16, 20*scale);
  const pad = 15;
  const hudFont = 'Nunito, sans-serif';

  // Semi-transparent backdrop behind right HUD
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  roundRect(ctx, W - pad - 130*scale, pad - 6, 130*scale + 6, fs*2 + 22, 10*scale);
  ctx.fill();

  // Semi-transparent backdrop behind left HUD
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  roundRect(ctx, pad - 6, pad - 6, 130*scale + 6, fs*2 + 22, 10*scale);
  ctx.fill();

  ctx.font = `bold ${fs}px ${hudFont}`;
  ctx.textBaseline = 'top';

  // Top-left: Score & Wave (RTL so we put on right side visually)
  ctx.textAlign = 'right';
  ctx.fillStyle = '#facc15';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  const scoreTxt = `${score} ⭐`;
  ctx.strokeText(scoreTxt, W - pad, pad);
  ctx.fillText(scoreTxt, W - pad, pad);

  ctx.fillStyle = '#fff';
  const waveTxt = `${wave} :גל`;
  ctx.strokeText(waveTxt, W - pad, pad + fs + 5);
  ctx.fillText(waveTxt, W - pad, pad + fs + 5);

  // Top-right (visually left): Lives & Converted
  ctx.textAlign = 'left';
  ctx.fillStyle = '#fff';
  let livesStr = '';
  for(let i=0;i<lives;i++) livesStr += '🐄';
  ctx.strokeText(livesStr, pad, pad);
  ctx.fillText(livesStr, pad, pad);

  ctx.fillStyle = '#4ade80';
  const convTxt = `🌱 ${converted}`;
  ctx.strokeText(convTxt, pad, pad + fs + 5);
  ctx.fillText(convTxt, pad, pad + fs + 5);

  // Active power-up indicators (center top)
  let puTexts = [];
  if(activePowerups.turbo > 0) puTexts.push(`⚡ ${Math.ceil(activePowerups.turbo/60)}s`);
  if(activePowerups.spread > 0) puTexts.push(`🌟 ${Math.ceil(activePowerups.spread/60)}s`);
  if(activePowerups.wagyu > 0) puTexts.push(`💎 x${activePowerups.wagyu}`);
  if(puTexts.length > 0){
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${fs*0.85}px ${hudFont}`;
    // Backdrop for power-up indicators
    const puStr = puTexts.join('  ');
    const puW = ctx.measureText(puStr).width + 24;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRect(ctx, W/2 - puW/2, pad - 6, puW, fs + 12, 8*scale);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.strokeText(puStr, W/2, pad);
    ctx.fillText(puStr, W/2, pad);
  }
}

// ---- GAME LOOP ----
let lastTime = 0;
function gameLoop(ts){
  const dt = Math.min((ts - lastTime) / 16.667, 3); // normalize to ~60fps
  lastTime = ts;

  // responsive resize only when dimensions actually change
  if(canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) resize();

  if(gameState === 'playing' || gameState === 'waveBreak'){
    update(dt);
  }

  draw();
  requestAnimationFrame(gameLoop);
}

})();
