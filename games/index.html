<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Games Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #0a0a2e 0%, #1a1a4e 50%, #0d0d3a 100%);
  font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  color: #fff;
  display: flex; flex-direction: column; align-items: center;
  padding: 2rem 1rem;
}
h1 {
  font-size: 2.5rem;
  background: linear-gradient(90deg, #ffd700, #ff6b35, #ffd700);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 0.5rem;
}
.subtitle { color: #aaa; margin-bottom: 2rem; }
.games-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.5rem; max-width: 900px; width: 100%;
}
.game-card {
  background: rgba(255,255,255,0.06);
  border: 2px solid rgba(255,215,0,0.2);
  border-radius: 16px; padding: 1.5rem;
  text-decoration: none; color: #fff;
  transition: all 0.2s;
}
.game-card:hover {
  border-color: #ffd700;
  background: rgba(255,215,0,0.1);
  transform: translateY(-4px);
  box-shadow: 0 8px 25px rgba(255,215,0,0.15);
}
.game-card .emoji { font-size: 3rem; margin-bottom: 0.5rem; }
.game-card h2 { color: #ffd700; font-size: 1.2rem; margin-bottom: 0.3rem; }
.game-card p { color: #aaa; font-size: 0.85rem; line-height: 1.4; }
.badge { display: inline-block; background: rgba(76,175,80,0.3); color: #4caf50; font-size: 0.7rem; padding: 0.15rem 0.5rem; border-radius: 8px; margin-top: 0.5rem; }
</style>
</head>
<body>
  <h1>AI Games Arcade</h1>
  <p class="subtitle">Browser games built with AI — play anywhere</p>
  <div class="games-grid">
    <a href="exodus-arena/" class="game-card">
      <div class="emoji">⚔️</div>
      <h2>Exodus Arena</h2>
      <p>Passover battle arena — pick a biblical hero, choose your weapon, fight through waves with trivia challenges</p>
      <span class="badge">Playable</span>
    </a>
  </div>
</body>
</html>
